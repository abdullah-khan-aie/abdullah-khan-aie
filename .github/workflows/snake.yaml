name: Generate Contribution Snake

# Regenerates the animated snake SVG that eats your contribution graph.
# Runs every 12 hours, on push to main, and can be triggered manually.

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs (dark + light)
        uses: Platane/snk@v3
        with:
          # IMPORTANT: replace with your real GitHub username
          github_user_name: abdullah-khan-aie
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#204ECF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#204ECF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
